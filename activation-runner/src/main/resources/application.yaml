server:
  port: ${SERVER_PORT:8089}
  shutdown: graceful

spring:
  application:
    name: activation-runner
  config:
    import:
      - optional:file:../infra/runner.env[.properties]
      - optional:file:./infra/runner.env[.properties]
  lifecycle:
    timeout-per-shutdown-phase: 30s
  main:
    banner-mode: off
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: ${RABBITMQ_PREFETCH:1}
        concurrency: ${RABBITMQ_CONCURRENCY:1}
        max-concurrency: ${RABBITMQ_MAX_CONCURRENCY:1}
        default-requeue-rejected: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState,docker,rabbitMQ
        readiness:
          include: readinessState,minio
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    docker:
      enabled: true
    rabbitMQ:
      enabled: true
    minio:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.90, 0.95, 0.99

logging:
  level:
    root: INFO
    com.actrade.activationrunner: INFO
    org.springframework.amqp: INFO

runner:
  instance-id: ${RUNNER_INSTANCE_ID:${HOSTNAME:activation-runner}}
  workspace-root: ${RUNNER_WORKSPACE_ROOT:./.runner-workspace}
  execution-mode: ${RUNNER_EXECUTION_MODE:docker}
  task-timeout-seconds: ${RUNNER_TASK_TIMEOUT_SECONDS:300}
  cleanup:
    enabled: ${RUNNER_CLEANUP_ENABLED:true}
    expire-hours: ${RUNNER_CLEANUP_EXPIRE_HOURS:24}
  mq:
    exchange: ${RUNNER_MQ_EXCHANGE:activation.task.exchange}
    queue: ${RUNNER_MQ_QUEUE:activation.task.execute}
    routing-key: ${RUNNER_MQ_ROUTING_KEY:activation.task.execute}
    dead-letter-exchange: ${RUNNER_MQ_DLX:activation.task.dlx}
    dead-letter-queue: ${RUNNER_MQ_DLQ:activation.task.execute.dlq}
    dead-letter-routing-key: ${RUNNER_MQ_DLQ_ROUTING_KEY:activation.task.execute.dlq}

actrade:
  api:
    base-url: ${ACTRADE_API_BASE_URL:http://localhost:8080}
    internal-token: ${ACTRADE_API_INTERNAL_TOKEN:change-me}
    internal-token-header: ${ACTRADE_API_INTERNAL_TOKEN_HEADER:X-Internal-Token}
    connect-timeout: ${ACTRADE_API_CONNECT_TIMEOUT:5s}
    read-timeout: ${ACTRADE_API_READ_TIMEOUT:60s}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-artifacts: ${MINIO_BUCKET_ARTIFACTS:activation-artifacts}
  bucket-results: ${MINIO_BUCKET_RESULTS:activation-results}
  download-timeout-seconds: ${MINIO_DOWNLOAD_TIMEOUT:300}
  buffer-size: ${MINIO_BUFFER_SIZE:8192}
  checksum-enabled: ${MINIO_CHECKSUM_ENABLED:true}
  upload-buffer-size: ${MINIO_UPLOAD_BUFFER_SIZE:8192}
  upload-timeout-seconds: ${MINIO_UPLOAD_TIMEOUT:300}
  auto-create-bucket: ${MINIO_AUTO_CREATE_BUCKET:true}

docker:
  binary: ${DOCKER_BINARY:docker}
  runtime: ${DOCKER_RUNTIME:runsc}
  network-disabled: ${DOCKER_NETWORK_DISABLED:true}
  default-timeout-seconds: ${DOCKER_DEFAULT_TIMEOUT_SECONDS:300}
  default-memory-mb: ${DOCKER_DEFAULT_MEMORY_MB:256}
  default-cpu-limit: ${DOCKER_DEFAULT_CPU_LIMIT:1.0}
  pids-limit: ${DOCKER_PIDS_LIMIT:128}
  image:
    shell: ${DOCKER_IMAGE_SHELL:activation-runner-shell:latest}
    pull-timeout-seconds: ${DOCKER_IMAGE_PULL_TIMEOUT:300}
    prewarm-strategy: ${DOCKER_IMAGE_PREWARM_STRATEGY:on-demand}
  gvisor:
    enabled: ${GVISOR_ENABLED:true}
    runsc-path: ${GVISOR_RUNSC_PATH:/usr/local/bin/runsc}
    sandbox-type: ${GVISOR_SANDBOX_TYPE:application}
    file-system-type: ${GVISOR_FS_TYPE:overlay}
    debug: ${GVISOR_DEBUG:false}
    debug-log-path: ${GVISOR_DEBUG_LOG:/var/log/runsc}
    log-format: ${GVISOR_LOG_FORMAT:text}
    trace-syscall: ${GVISOR_TRACE_SYSCALL:false}
    trace-file: ${GVISOR_TRACE_FILE:/var/log/runsc_syscall}
    network-mode: ${GVISOR_NETWORK_MODE:sandboxed}
    seccomp-enabled: ${GVISOR_SECCOMP_ENABLED:true}
    seccomp-profile: ${GVISOR_SECCOMP_PROFILE:}
    disable-host-sharing: ${GVISOR_DISABLE_HOST_SHARING:true}
    heartbeat-interval-ms: ${GVISOR_HEARTBEAT_MS:10000}
    max-start-time-ms: ${GVISOR_MAX_START_MS:30000}
    test-mode-enabled: ${GVISOR_TEST_MODE:false}
    warning-action: ${GVISOR_WARNING_ACTION:log}