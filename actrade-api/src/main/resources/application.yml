server:
  port: ${APP_PORT:8080}

spring:
  config:
    import:
      - optional:file:../infra/api.env[.properties]
      - optional:file:./infra/api.env[.properties]

  application:
    name: ${APP_NAME:actrade-api}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:actrade}
    username: ${POSTGRES_USER:actrade}
    password: ${POSTGRES_PASSWORD:actrade123}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: actrade-hikari-pool
      minimum-idle: 2
      maximum-pool-size: 10
      auto-commit: false
      connection-timeout: 30000

  jpa:
    open-in-view: false
    show-sql: ${SHOW_SQL:false}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: ${SQL_INIT_MODE:never}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:actrade123}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3s}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5673}
    username: ${RABBITMQ_USER:actrade}
    password: ${RABBITMQ_PASSWORD:actrade123}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        default-requeue-rejected: false

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_DETAILS:always}

payment:
  alipay:
    enabled: true

    protocol: https

    # 沙箱联调时：这里必须改成支付宝沙箱控制台给你的 gateway host
    # 正式环境时：openapi.alipay.com
    gateway-host: ${ALIPAY_GATEWAY_HOST:openapi.alipay.com}

    sign-type: RSA2
    app-id: ${ALIPAY_APP_ID}
    merchant-private-key: ${ALIPAY_MERCHANT_PRIVATE_KEY}

    # 证书模式
    merchant-cert-path: cert/alipay/appPublicCert.crt
    alipay-cert-path: cert/alipay/alipayPublicCert.crt
    alipay-root-cert-path: cert/alipay/alipayRootCert.crt

    notify-url: ${ALIPAY_NOTIFY_URL}
    return-url: ${ALIPAY_RETURN_URL}

    subject-prefix: ${ALIPAY_SUBJECT_PREFIX:Actrade订单}
    ignore-ssl: false

logging:
  level:
    root: INFO